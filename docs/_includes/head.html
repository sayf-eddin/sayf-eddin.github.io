<head>
  {% if page.canonical %}
  {% assign canonical_url = page.canonical %}
  {% else %}
  {% assign canonical_url = page.url | absolute_url %}
  {% endif %}

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>{{ site.title }}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.description }}">
  <meta name="theme-color" content="#050050">

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ canonical_url }}" />
  <meta property="og:title" content="{{ site.title }}" />
  <meta property="og:description" content="{{ site.description }}" />
  {% if site.images.seo %}
  <meta property="og:image" content="{{ site.images.seo | absolute_url }}" />{% endif %}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ site.title }}" />
  <meta name="twitter:description" content="{{ site.description }}" />
  {% if site.images.seo %}
  <meta name="twitter:image" content="{{ site.images.seo | absolute_url }}" />{% endif %}

  <link rel="preload" href="{{ '/assets/fonts/source-sans-pro-latin-400.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>

  <!-- Stylesheets -->
  <link rel="stylesheet" type="text/css" href="{{ '/assets/lib/bootstrap/bootstrap.min.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/lib/flickity/flickity.min.css' | relative_url }}">
  <link rel="stylesheet" type="text/css" href="{{ '/assets/css/site.css' | relative_url }}" />
  {% feed_meta %}

  <!-- Favicon -->
  <link rel="canonical" href="{{ canonical_url }}">
  <link rel="shortcut icon" href="{{ site.images.favicon }}" type="image/x-icon">
  <link rel="icon" href="{{ site.images.favicon }}" type="image/x-icon">
</head>
