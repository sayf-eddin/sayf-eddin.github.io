<head>
  {% if page.canonical %}
  {% assign canonical_url = page.canonical %}
  {% else %}
  {% assign canonical_url = page.url | absolute_url %}
  {% endif %}

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>{{ site.title }}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.description }}">

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ canonical_url }}" />
  <meta property="og:title" content="{{ site.title }}" />
  <meta property="og:description" content="{{ site.description }}" />
  {% if site.images.seo %}
  <meta property="og:image" content="{{ site.images.seo }}" />{% endif %}

  <!-- Stylesheets -->
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="stylesheet" href="https://unpkg.com/flickity@2.3.0/dist/flickity.min.css"
    integrity="sha384-wfOgSEM5nkw8PLlzyXQgRPrDQY0BpMazkjjgkfIB4IhTeIF1CD4u/R4NHgzhSF2q" crossorigin="anonymous">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro&display=swap">
  <link rel="stylesheet" type="text/css" href="{{ '/assets/css/site.css' | relative_url }}" />
  {% feed_meta %}

  <!-- Favicon -->
  <link rel="canonical" href="{{ canonical_url }}">
  <link rel="shortcut icon" href="{{ site.images.favicon }}" type="image/x-icon">
  <link rel="icon" href="{{ site.images.favicon }}" type="image/x-icon">
</head>
