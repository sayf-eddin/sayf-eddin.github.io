<head>
  {% if page.canonical %}
  {% assign canonical_url = page.canonical %}
  {% else %}
  {% assign canonical_url = page.url | absolute_url %}
  {% endif %}

  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <title>{{ site.title }}</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="{{ site.description }}">
  <meta name="theme-color" content="#0b0a17" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#faf9ff" media="(prefers-color-scheme: light)">

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="{{ canonical_url }}" />
  <meta property="og:title" content="{{ site.title }}" />
  <meta property="og:description" content="{{ site.description }}" />
  {% if site.images.seo %}
  <meta property="og:image" content="{{ site.images.seo | absolute_url }}" />{% endif %}

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ site.title }}" />
  <meta name="twitter:description" content="{{ site.description }}" />
  {% if site.images.seo %}
  <meta name="twitter:image" content="{{ site.images.seo | absolute_url }}" />{% endif %}

  <link rel="preload" href="{{ '/assets/fonts/inter-latin-variable.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ '/assets/fonts/jetbrains-mono-latin-500.woff2' | relative_url }}" as="font" type="font/woff2" crossorigin>

  <!-- Stylesheets -->
  <link rel="stylesheet" type="text/css" href="{{ '/assets/css/site.css' | relative_url }}?v={{ site.time | date: '%s' }}" />
  {% feed_meta %}

  <!-- Without JS: the scroll-reveal observer never runs, so force reveal
       content visible instead of stuck at opacity: 0. The mobile nav toggle
       also has no click handler to open it, so drop it and show the menu
       inline instead of collapsed. -->
  <noscript><style>
    .reveal { opacity: 1 !important; transform: none !important; }
    @media (max-width: 800px) {
      .nav-toggle { display: none !important; }
      .nav { position: static !important; background-color: var(--bg) !important; border-bottom-color: var(--border) !important; }
      .nav-inner { flex-wrap: wrap !important; }
      .nav-menu { position: static !important; flex-basis: 100% !important; max-height: none !important; overflow: visible !important; }
      .hero-content { padding-top: 3rem !important; }
    }
  </style></noscript>

  <!-- Favicon -->
  <link rel="canonical" href="{{ canonical_url }}">
  <link rel="icon" href="{{ site.images.favicon }}" sizes="any">
  <link rel="icon" href="{{ site.images.favicon_png }}" type="image/png">
  <link rel="apple-touch-icon" href="{{ site.images.apple_touch_icon }}">
</head>
