<section class="work" id="work">
  <div class="text-center">
    <h3>◇ Work History ◇</h3>
  </div>
  <div class="container">
    {% for job in site.data.work %}
    <div class="job">
      <h4>{{ job.role }}</h4>
      <h5>{{ job.company }}</h5>
      <h5>{{ job.years }}</h5>
      <div class="desc">
        {{ job.description | markdownify }}
      </div>
    </div>
    {% endfor %}
  </div>
</section>
