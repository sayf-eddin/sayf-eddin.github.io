<section class="work" id="work" aria-labelledby="work-heading">
  <div class="text-center">
    <h3 id="work-heading"><span class="diamond" aria-hidden="true">◇</span> Work History <span class="diamond" aria-hidden="true">◇</span></h3>
  </div>
  <div class="container">
    {% for job in site.data.work %}
    <div class="job">
      <h4>{{ job.role }}</h4>
      <h5>{{ job.company }}</h5>
      <h5>{{ job.years }}</h5>
      <div class="desc">
        {{ job.description | markdownify }}
      </div>
    </div>
    {% endfor %}
  </div>
</section>
