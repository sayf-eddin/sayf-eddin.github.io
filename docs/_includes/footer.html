<section class="footer" id="footer" aria-label="Links">
  <div class="container">
    <div class="row justify-content-center">
      {% for button in site.data.footer %}
      <div class="col">
        {% if button.name == "GitHub" or button.name == "LinkedIn" %}
        <a class="d-flex justify-content-center" href="{{ button.link }}" target="_blank" rel="me noopener noreferrer">
        {% else %}
        <a class="d-flex justify-content-center" href="{{ button.link }}" target="_blank" rel="noopener noreferrer">
        {% endif %}
          <div class="button">
            {{ button.name }}
          </div>
        </a>
      </div>
      {% endfor %}
    </div>
    <div class="footer_img"></div>
  </div>
</section>
