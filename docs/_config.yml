# --------------
# -- Settings --
# --------------

title: Sayf Eddin Ahmed
description: >-
  Scaling production systems end-to-end: modern architecture, secure integrations, cloud deployment.
baseurl: ""
url: "https://sayf-eddin.me"

# The layout in _layouts/default.html is fully custom and doesn't use any
# theme. Explicitly disable one, otherwise the github-pages gem silently
# falls back to jekyll-theme-primer and leaks its unused assets into the build.
theme: null

# jekyll-feed provides the {% feed_meta %} tag used in _includes/head.html.
plugins:
  - jekyll-feed

images:
  favicon: "/assets/images/favicon.ico"
  favicon_png: "/assets/images/favicon-32.png"
  apple_touch_icon: "/assets/images/apple-touch-icon.png"
  hero: "/assets/images/profile.webp"
  seo: "/assets/images/seo.jpg"
  education: "/assets/images/syracuse.webp"
