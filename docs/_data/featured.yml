- title: "Centro Bus Schedule GTFS API"
  images:
    - "/assets/images/api_doc.webp"
    - "/assets/images/SU443_routes.webp"
    - "/assets/images/bus_api.webp"
  text: >
    REST API built in Django for Syracuse University’s Centro [bus&nbsp;schedules](https://www.centro.org/colleges/syracuse-university){:target="_blank" rel="noopener noreferrer"}

    * Scripts to pull and read [GTFS data](https://transitfeeds.com/p/central-new-york-rta/524){:target="_blank" rel="noopener noreferrer"} and populate a PostgreSQL database with tables for services, routes, trips, and&nbsp;stops

    * Endpoints with query parameter filters for all tables and the South Campus bus schedule for&nbsp;today

    * Deployable in Docker container with images for PostgreSQL, MinIO, and&nbsp;Redis

